<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Example</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div class="container my-4">
    <div class="container mx-auto shadow p-4" style="width:70%;background-Color:hsl(210, 9%, 91%)">
        <form>
            <fieldset>
                <legend>Personal Information</legend>
            </fieldset>
                <!--Start: First_Name-->
                <div class="mb-4">
                    <div class="row">
                        <div class="col-md-3">
                            <label for="fname" class="form-label">First_Name</label>
                        </div>
                        <div class="col-md-9">
                            <input type="text" id="fname" name="fname" class="form-control" placeholder="Enter Your Name" />
                        </div>
                    </div>
                </div>
                <!--Start: Last_Name-->
                <div class="mb-4">
                    <div class="row">
                        <div class="col-md-3">
                            <label for="lName" class="form-label">Last_Name</label>
                        </div>
                        <div class="col-md-9">
                            <input type="text" id="lname" name="lname" class="form-control" placeholder="Enter Last_Name" />
                        </div>
                    </div>
                </div>
                <!--Start: Email-->
                <div class="mb-4">
                    <div class="row">
                        <div class="col-md-3">
                            <label for="email" class="form-label">Email</label>
                        </div>
                        <div class="col-md-9">
                            <input type="email" id="email" name="email" class="form-control" placeholder="Enter Email" />
                        </div>
                    </div>
                </div>
                <!--Start: Phone Number-->
                <div class="mb-4">
                    <div class="row">
                        <div class="col-md-3">
                            <label for="number" class="form-label">Phone_Number</label>
                        </div>
                        <div class="col-md-9">
                            <input type="number" id="number" name="number" class="form-control" placeholder="Enter Mobile Number"/>
                        </div>
                    </div>
                </div>
                <!--Start: Date Of Birth-->
                <div class="mb-4">
                    <div class="row">
                        <div class="col-md-3">
                            <label for="DOB" class="form-label">Date of Birth</label>
                        </div>
                        <div class="col-md-9">
                            <div class="row">
                                <div class="col-md-4">
                                    <select class="form-select" id="DOB" name="day">
                                        <option value="">Day</option>
                                        <option value="Saturday">Saturday</option>
                                        <option value="Sunday">Sunday</option>
                                        <option value="Monday">Monday</option>
                                        <option value="Tuesday">Tuesday</option>
                                        <option value="Wednesday">Wednesday</option>
                                        <option value="Thursday">Thursday</option>
                                        <option value="Friday">Friday</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <select class="form-select" id="DOB" name="Month">
                                        <option value="">Month</option>
                                        <option value="Saturday">Saturday</option>
                                        <option value="Sunday">Sunday</option>
                                        <option value="Monday">Monday</option>
                                        <option value="Tuesday">Tuesday</option>
                                        <option value="Wednesday">Wednesday</option>
                                        <option value="Thursday">Thursday</option>
                                        <option value="Friday">Friday</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <select class="form-select" id="DOB" name="Year">
                                        <option value="">Year</option>
                                        <option value="Saturday">Saturday</option>
                                        <option value="Sunday">Sunday</option>
                                        <option value="Monday">Monday</option>
                                        <option value="Tuesday">Tuesday</option>
                                        <option value="Wednesday">Wednesday</option>
                                        <option value="Thursday">Thursday</option>
                                        <option value="Friday">Friday</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!--Start: PostalAddress-->
                <div class="mb-4">
                    <div class="row">
                        <div class="col-md-3">
                            <label for="Postal" class="form-label">Postal_Address</label>
                        </div>
                        <div class="col-md-9">
                            <textarea type="text" id="Postal" name="address" class="form-control" placeholder="Enter Address" row="10"></textarea>
                        </div>
                    </div>
                </div>
                <!--Start: Zip Codes-->
                <div class="mb-4">
                    <div class="row">
                        <div class="col-md-3">
                            <label for="zip" class="form-label">Zip Code</label>
                        </div>
                        <div class="col-md-9">
                            <input type="text" id="zip" name="zip" class="form-control" placeholder="Enter Zip Code" />
                        </div>
                    </div>
                </div>
                <!--Start: IMG-->
                <div class="mb-4">
                    <div class="row">
                        <div class="col-md-3">
                            <label for="img" class="form-label">Img Upload</label>
                        </div>
                        <div class="col-md-9">
                            <input type="file" id="img" name="img" class="form-control" placeholder="Enter Image" />
                        </div>
                    </div>
                </div>
                <!--Start: Gender-->
                <div class="mb-4">
                    <div class="row">
                        <div class="col-md-3">
                            <label for="gender" class="form-label">Gender</label>
                        </div>
                        <div class="col-md-9">
                            <div class="form-check form-check-inline">
                                <input type="radio" id="male" name="male" class="form-check-input">
                                <label for="male" class="form-check-label">Male</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input type="radio" id="female" name="female" class="form-check-input">
                                <label for="female" class="form-check-label">Female</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input type="radio" id="common" name="common" class="form-check-input">
                                <label for="common" class="form-check-label">Common</label>
                            </div>
                        </div>
                    </div>
                </div>
                <!--Start: Term and Condition-->
                <div class="mb-4">
                    <div class="row">
                        <div class="col-md-9 offset-md-3">
                            <div class="form-check">
                            <input type="checkbox" name="condition" id="condition" class="form-check-input">
                            <label for="condition" class="form-check-label">I agree to the <a href="">Terms and Condition</a></label>
                            </div>
                        </div>
                    </div>
                </div>
                <!--Start: Submit and Reset Button-->
                <div class="mb-4">
                    <div class="row">
                        <div class="col-md-9 offset-md-3">
                            <input type="submit" name="submit" class="btn btn-primary" value="Submit">
                            <input type="reset" name="reset" class="btn btn-secondary" value="Reset">                           
                    </div>
                </div>
           </fieldset>
        </form>
    </div>
</div>   
  
</body>
</html>
